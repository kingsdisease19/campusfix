<!-- ============================================================
     templates/base.html
     Shared layout that all other pages extend.
     ============================================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CampusFix – {% block title %}{% endblock %}</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

  <style>
    body { background: #f0f4ff; font-family: 'Segoe UI', sans-serif; }

    /* Navbar */
    .navbar-brand { font-weight: 800; font-size: 1.4rem; color: #0d6efd !important; }
    .navbar-brand span { color: #f59e0b; }

    /* Auth card */
    .auth-card {
      max-width: 440px;
      margin: 60px auto;
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px rgba(13,110,253,0.10);
    }
    .auth-card h2 { font-weight: 800; color: #0f1117; }
    .auth-card .subtitle { color: #6b7280; font-size: .95rem; }
    .btn-primary { background: #0d6efd; border: none; font-weight: 600; padding: .65rem; }
    .btn-primary:hover { background: #1a3fce; }

    /* Dashboard */
    .dashboard-card {
      max-width: 500px;
      margin: 80px auto;
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px rgba(13,110,253,0.10);
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand" href="/">Campus<span>Fix</span></a>
      <span class="text-muted small">Student Tech Marketplace</span>
    </div>
  </nav>

  <!-- Flash messages (success / error alerts) -->
  <div class="container mt-3">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
  </div>

  <!-- Page content goes here -->
  {% block content %}{% endblock %}

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
