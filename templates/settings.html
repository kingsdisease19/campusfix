{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <h2 class="fw-bold mb-4">Account Settings</h2>

            <form method="POST">
                <!-- Basic Info Card -->
                <div class="card p-4 mb-4">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">Public Profile</h5>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Full Name</label>
                            <input type="text" name="name" class="form-control" value="{{ user.name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Phone Number</label>
                            <input type="tel" name="phone" class="form-control" value="{{ user.phone or '' }}"
                                placeholder="097...">
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">University</label>
                            <select name="university" class="form-select">
                                <option value="{{ user.university }}">{{ user.university }}</option>
                                <option disabled>──────────</option>
                                <option>University of Zambia (UNZA)</option>
                                <option>Copperbelt University (CBU)</option>
                                <option>Mulungushi University</option>
                                <option>Kwame Nkrumah University</option>
                                <option>Chalimbana University</option>
                                <option>Mukuba University</option>
                                <option>NIPA</option>
                                <option>Evelyn Hone College</option>
                                <option>ZCAS University</option>
                                <option>Cavendish University Zambia</option>
                                <option>Texila American University</option>
                                <option>DMI St Eugene University</option>
                                <option>Lusaka Apex Medical University</option>
                                <option>Levy Mwanawasa Medical University</option>
                                <option>Rockview University</option>
                                <option>Northrise University</option>
                                <option>Rusangu University</option>
                                <option>Zambia Catholic University</option>
                                <option>Livingstone International University</option>
                                <option>Zambia Institute of Mass Communication</option>
                                <option>Natural Resources Development College</option>
                                <option>Zambia Air Services Training Institute</option>
                                <option>Northern Technical College (NORTEC)</option>
                                <option>Lusaka Business and Technical College</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">Bio</label>
                            <textarea name="bio" class="form-control" rows="4"
                                placeholder="Briefly describe your tech skills or background...">{{ user.bio or '' }}</textarea>
                            <div class="form-text">Share a bit about yourself with the campus.</div>
                        </div>
                    </div>
                </div>

                <!-- Action Button -->
                <div class="d-flex justify-content-end gap-2">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-light px-4">Cancel</a>
                    <button type="submit" class="btn btn-primary px-5">Save Changes</button>
                </div>
            </form>

            <hr class="my-5">

            <!-- Security Card -->
            <div class="card p-4 border-danger border-opacity-25 bg-danger-subtle">
                <h5 class="fw-bold text-danger mb-3">Privacy & Security</h5>
                <p class="small text-muted mb-4 text-dark">Take control of your account access and visibility.</p>
                <div class="d-grid gap-2">
                    <button class="btn btn-outline-dark btn-sm text-start"><i class="bi bi-shield-lock me-2"></i>Change
                        Password</button>
                    <button class="btn btn-outline-danger btn-sm text-start"><i class="bi bi-trash me-2"></i>Delete
                        Account permanently</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
