{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card p-4">
        <div class="text-center mb-4">
          <h2 class="fw-bold">Login</h2>
          <p class="text-muted">Enter your credentials to continue</p>
        </div>

        {% if locked %}
        <div class="alert alert-danger text-center">
          <i class="bi bi-lock-fill me-2"></i> Account Locked
        </div>
        {% endif %}

        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-bold">Email Address</label>
            <input type="email" name="email" class="form-control px-3 py-2" placeholder="name@example.com" required {%
              if locked %}disabled{% endif %}>
          </div>

          <div class="mb-4">
            <div class="d-flex justify-content-between">
              <label class="form-label fw-bold">Password</label>
              <a href="#" class="small text-decoration-none">Forgot?</a>
            </div>
            <input type="password" name="password" class="form-control px-3 py-2" placeholder="Enter password" required
              {% if locked %}disabled{% endif %}>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2" {% if locked %}disabled{% endif %}>
            Login to CampusFix
          </button>

          <div class="text-center mt-3">
            <small class="text-muted">New student? <a href="{{ url_for('register') }}">Create Account</a></small>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
