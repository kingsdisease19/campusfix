{% extends "base.html" %}

{% block title %}Join CampusFix{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card p-4">
        <div class="text-center mb-4">
          <h2 class="fw-bold">Create Account</h2>
          <p class="text-muted">Join the Zambian student marketplace</p>
        </div>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-bold">Full Name</label>
            <input type="text" name="name" class="form-control px-3 py-2" placeholder="John Doe" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Email Address</label>
            <input type="email" name="email" class="form-control px-3 py-2" placeholder="student@example.com" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Phone Number</label>
            <input type="tel" name="phone" class="form-control px-3 py-2" placeholder="097..." required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">University</label>
            <select name="university" class="form-select px-3 py-2" required>
              <option value="">Select your university</option>
              <option>University of Zambia (UNZA)</option>
              <option>Copperbelt University (CBU)</option>
              <option>Mulungushi University</option>
              <option>Kwame Nkrumah University</option>
              <option>Chalimbana University</option>
              <option>Mukuba University</option>
              <option>NIPA</option>
              <option>Evelyn Hone College</option>
              <option>ZCAS University</option>
              <option>Cavendish University Zambia</option>
              <option>Texila American University</option>
              <option>DMI St Eugene University</option>
              <option>Lusaka Apex Medical University</option>
              <option>Levy Mwanawasa Medical University</option>
              <option>Rockview University</option>
              <option>Northrise University</option>
              <option>Rusangu University</option>
              <option>Zambia Catholic University</option>
              <option>Livingstone International University</option>
              <option>Zambia Institute of Mass Communication</option>
              <option>Natural Resources Development College</option>
              <option>Zambia Air Services Training Institute</option>
              <option>Northern Technical College (NORTEC)</option>
              <option>Lusaka Business and Technical College</option>
            </select>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">Password</label>
            <input type="password" name="password" class="form-control px-3 py-2" placeholder="Min 6 characters"
              required minlength="6">
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2">Create Account</button>

          <div class="text-center mt-3">
            <small class="text-muted">Already have an account? <a href="{{ url_for('login') }}">Login</a></small>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
