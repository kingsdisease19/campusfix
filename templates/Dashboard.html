<!-- ============================================================
     templates/dashboard.html
     Simple page shown to logged-in users
     ============================================================ -->
{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="dashboard-card">

  <div class="mb-3" style="font-size:3rem;">✅</div>
  <h2 class="fw-800 mb-1">Hey, {{ name }}!</h2>
  <p class="text-muted mb-4">You are successfully logged in to CampusFix.</p>

  <div class="bg-light rounded-3 p-3 mb-4 text-start">
    <p class="mb-1 fw-semibold">🎓 You're all set!</p>
    <p class="text-muted small mb-0">
      This is your dashboard. You can start posting tech problems
      or browsing jobs to help other students.
    </p>
  </div>

  <!-- Logout button -->
  <a href="/logout" class="btn btn-outline-danger rounded-3 px-4">
    <i class="bi bi-box-arrow-right me-2"></i>Log Out
  </a>

</div>
{% endblock %}
