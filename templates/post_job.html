{% extends "base.html" %}

{% block title %}Post a Problem{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="text-center mb-5">
                <h2 class="fw-bold">Get Technical Help</h2>
                <p class="text-muted">Describe your problem and set a budget to attract student experts.</p>
            </div>

            <div class="card p-4 shadow-sm border-0">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Problem Title</label>
                        <input type="text" name="title" class="form-control px-3 fs-5"
                            placeholder="e.g. Broken Laptop Screen, Networking Issues" required>
                        <div class="form-text">Keep it short and descriptive.</div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Category</label>
                            <select name="category" class="form-select" required>
                                <option value="">Select category</option>
                                <option>Laptop Repair</option>
                                <option>Phone Repair</option>
                                <option>WiFi and Networking</option>
                                <option>Programming Help</option>
                                <option>Assignment Help</option>
                                <option>Software Installation</option>
                                <option>Hardware Repair</option>
                                <option>Graphic Design</option>
                                <option>Data Recovery</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Estimated Budget (KMW)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light fw-bold text-primary">K</span>
                                <input type="number" name="budget" class="form-control" placeholder="100" required>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Detailed Description</label>
                        <textarea name="description" class="form-control" rows="6"
                            placeholder="Describe the symptoms, what happened, and any specific model details..."
                            required></textarea>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Deadline (Optional)</label>
                            <input type="date" name="deadline" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Upload Image (Optional)</label>
                            <input type="file" name="image" class="form-control" accept="image/*">
                        </div>
                    </div>

                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill">Post this
                            Problem</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
