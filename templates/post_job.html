{% extends "base.html" %}

{% block title %}Post a Job{% endblock %}

{% block content %}
<style>
    /* Form card */
    .form-card {
        max-width: 600px;
        margin: 50px auto 80px;
        background: #fff;
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 8px 32px rgba(13, 110, 253, .10);
    }

    .form-card h2 {
        font-weight: 800;
        color: #0f1117;
    }

    /* Category pills */
    .category-btn input[type="radio"] {
        display: none;
    }

    .category-btn label {
        cursor: pointer;
        border: 2px solid #e5e7eb;
        border-radius: 30px;
        padding: .4rem 1rem;
        font-size: .85rem;
        font-weight: 600;
        color: #6b7280;
        transition: all .15s;
        display: inline-block;
    }

    .category-btn input[type="radio"]:checked+label {
        border-color: #0d6efd;
        background: #e8eeff;
        color: #0d6efd;
    }
</style>

<div class="form-card">
    <div class="mb-4">
        <p class="text-muted small mb-1">
            <a href="/jobs" class="text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i>Back to Jobs
            </a>
        </p>
        <h2>Post a Tech Problem</h2>
        <p class="text-muted" style="font-size:.93rem;">
            Describe your issue and set a budget — students will offer to help.
        </p>
    </div>

    <form method="POST" action="/post-job">
        <!-- Job Title -->
        <div class="mb-3">
            <label for="title" class="form-label fw-semibold">Job Title</label>
            <input type="text" id="title" name="title" class="form-control" placeholder="e.g. Fix my laptop WiFi issue"
                maxlength="100" required />
            <div class="form-text">Keep it short and clear.</div>
        </div>

        <!-- Category -->
        <div class="mb-3">
            <label class="form-label fw-semibold">Category</label>
            <div class="d-flex flex-wrap gap-2">
                <div class="category-btn">
                    <input type="radio" id="cat1" name="category" value="Networking" required />
                    <label for="cat1"><i class="bi bi-wifi me-1"></i>Networking</label>
                </div>
                <div class="category-btn">
                    <input type="radio" id="cat2" name="category" value="OS / Linux" />
                    <label for="cat2"><i class="bi bi-laptop me-1"></i>OS / Linux</label>
                </div>
                <div class="category-btn">
                    <input type="radio" id="cat3" name="category" value="Programming" />
                    <label for="cat3"><i class="bi bi-code-slash me-1"></i>Programming</label>
                </div>
                <div class="category-btn">
                    <input type="radio" id="cat4" name="category" value="Hardware" />
                    <label for="cat4"><i class="bi bi-cpu me-1"></i>Hardware</label>
                </div>
                <div class="category-btn">
                    <input type="radio" id="cat5" name="category" value="Software" />
                    <label for="cat5"><i class="bi bi-app me-1"></i>Software</label>
                </div>
                <div class="category-btn">
                    <input type="radio" id="cat6" name="category" value="Other" />
                    <label for="cat6"><i class="bi bi-three-dots me-1"></i>Other</label>
                </div>
            </div>
        </div>

        <!-- Budget -->
        <div class="mb-3">
            <label for="budget" class="form-label fw-semibold">Budget (K)</label>
            <div class="input-group">
                <span class="input-group-text fw-bold">K</span>
                <input type="number" id="budget" name="budget" class="form-control" placeholder="e.g. 50" min="1"
                    step="any" required />
            </div>
            <div class="form-text">How much are you willing to pay for this fix?</div>
        </div>

        <!-- Description -->
        <div class="mb-4">
            <label for="description" class="form-label fw-semibold">Description</label>
            <textarea id="description" name="description" class="form-control" rows="5"
                placeholder="Describe the problem in detail. The more info you give, the faster you'll get help."
                required></textarea>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary w-100 rounded-3">
            <i class="bi bi-send me-2"></i>Post Job
        </button>
    </form>
</div>
{% endblock %}
